name: Laravel CI/CD

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, xml, ctype, json, bcmath, pdo_pgsql
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: PHP Syntax Check
        run: |
          find app routes database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Laravel Pint
        run: ./vendor/bin/pint --test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Setup Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Run Tests
        run: php artisan test

      - name: Composer Audit
        run: composer audit


  deploy:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |

            cd /var/www/html/Laravel_React_Admin_PostgreSQL

            git config --global --add safe.directory /var/www/html/Laravel_React_Admin_PostgreSQL

            git restore .

            git clean -fd

            git fetch origin

            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader --no-interaction

            npm install

            npm run build

            php artisan migrate --force

            php artisan optimize:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

      - name: Seed Database
        run: php artisan db:seed --force